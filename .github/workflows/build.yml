name: Build Singularity

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Windows build → .exe + .msi
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Verify libmpv-2.dll exists
        shell: bash
        run: |
          if [ ! -f "src-tauri/resources/libmpv-2.dll" ]; then
            echo "ERROR: src-tauri/resources/libmpv-2.dll is missing."
            echo "This file must be committed via Git LFS."
            exit 1
          fi
          echo "libmpv-2.dll found: $(ls -lh src-tauri/resources/libmpv-2.dll)"

      - name: Build Tauri (Windows)
        run: npm run tauri build

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # Android build → .apk
  # ───────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973" --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npm run tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > "$HOME/singularity.keystore"
          echo "KEYSTORE_PATH=$HOME/singularity.keystore" >> $GITHUB_ENV

      - name: Patch app/build.gradle with release signing config
        run: |
          GRADLE=src-tauri/gen/android/app/build.gradle.kts
          # Insert signingConfigs block and wire it to the release buildType
          python3 - <<'PYEOF'
          import re, os
          path = "src-tauri/gen/android/app/build.gradle.kts"
          text = open(path).read()

          signing_block = """
              signingConfigs {
                  create("release") {
                      storeFile = file(System.getenv("KEYSTORE_PATH") ?: "")
                      storePassword = System.getenv("ANDROID_STORE_PASSWORD") ?: ""
                      keyAlias = System.getenv("ANDROID_KEY_ALIAS") ?: ""
                      keyPassword = System.getenv("ANDROID_KEY_PASSWORD") ?: ""
                  }
              }
          """

          # Add signingConfigs before buildTypes
          text = text.replace("    buildTypes {", signing_block + "    buildTypes {")

          # Wire release buildType to use the signing config
          text = re.sub(
              r'(release\s*\{)',
              r'\1\n            signingConfig = signingConfigs.getByName("release")',
              text,
              count=1
          )

          open(path, "w").write(text)
          print("Patched", path)
          PYEOF
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}

      - name: Build Tauri Android (APK)
        run: npm run tauri android build -- --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | while read f; do
            mv "$f" "$(dirname $f)/SingularityV2.apk"
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/SingularityV2.apk
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # Create GitHub Release (only on version tags)
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Windows .exe
        uses: actions/download-artifact@v4
        with:
          name: singularity-windows-exe
          path: release-assets/

      - name: Download Windows .msi
        uses: actions/download-artifact@v4
        with:
          name: singularity-windows-msi
          path: release-assets/

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: singularity-android-apk
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Singularity ${{ github.ref_name }}
          body: |
            ## Singularity ${{ github.ref_name }}

            IPTV/VOD streaming player for Windows Desktop and Android.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows (installer) | `Singularity_*_x64-setup.exe` |
            | Windows (MSI) | `Singularity_*.msi` |
            | Android | `*.apk` |

            ### Install
            - **Windows**: Run the `.exe` installer or the `.msi` package
            - **Android**: Enable "Install from unknown sources", then install the `.apk`
          files: release-assets/**/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
