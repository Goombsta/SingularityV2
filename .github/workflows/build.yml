name: Build Singularity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Windows build → .exe + .msi
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Verify libmpv-2.dll exists
        shell: bash
        run: |
          if [ ! -f "src-tauri/resources/libmpv-2.dll" ]; then
            echo "ERROR: src-tauri/resources/libmpv-2.dll is missing."
            echo "This file must be committed via Git LFS."
            exit 1
          fi
          echo "libmpv-2.dll found: $(ls -lh src-tauri/resources/libmpv-2.dll)"

      - name: Build Tauri (Windows)
        run: npm run tauri build

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # Android build → .apk
  # ───────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973" --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npm run tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Build Tauri Android (APK)
        run: npm run tauri android build -- --apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
