name: Build Singularity

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Windows build → .exe + .msi
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Verify libmpv-2.dll exists
        shell: bash
        run: |
          if [ ! -f "src-tauri/resources/libmpv-2.dll" ]; then
            echo "ERROR: src-tauri/resources/libmpv-2.dll is missing."
            echo "This file must be committed via Git LFS."
            exit 1
          fi
          echo "libmpv-2.dll found: $(ls -lh src-tauri/resources/libmpv-2.dll)"

      - name: Build Tauri (Windows)
        run: npm run tauri build

      - name: Rename installer artifacts
        shell: bash
        run: |
          EXE=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          if [ -n "$EXE" ]; then
            VERSION=$(echo "$EXE" | grep -oP '\d+\.\d+\.\d+')
            mv "$EXE" "src-tauri/target/release/bundle/nsis/Singularity Setup_${VERSION}_x64-setup.exe"
          fi
          MSI=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          if [ -n "$MSI" ]; then
            VERSION=$(echo "$MSI" | grep -oP '\d+\.\d+\.\d+')
            mv "$MSI" "src-tauri/target/release/bundle/msi/Singularity Setup_${VERSION}_x64.msi"
          fi

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # Android build → .apk
  # ───────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973" --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npm run tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > "$HOME/singularity.keystore"
          echo "KEYSTORE_PATH=$HOME/singularity.keystore" >> $GITHUB_ENV

      - name: Build Tauri Android (APK, debug)
        run: npm run tauri android build -- --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Sign and align APK
        run: |
          # Find the unsigned APK
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found APK: $APK"

          # Locate build tools
          BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS"

          # zipalign
          $BUILD_TOOLS/zipalign -v -p 4 "$APK" /tmp/aligned.apk

          # apksigner with release keystore
          $BUILD_TOOLS/apksigner sign \
            --ks "$KEYSTORE_PATH" \
            --ks-pass "pass:${{ secrets.ANDROID_STORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out /tmp/SingularityV2.apk \
            /tmp/aligned.apk

          echo "Signed APK: /tmp/SingularityV2.apk"
          $BUILD_TOOLS/apksigner verify /tmp/SingularityV2.apk && echo "Verification OK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-android-apk
          path: /tmp/SingularityV2.apk
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  # Create GitHub Release (only on version tags)
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Windows .exe
        uses: actions/download-artifact@v4
        with:
          name: singularity-windows-exe
          path: release-assets/

      - name: Download Windows .msi
        uses: actions/download-artifact@v4
        with:
          name: singularity-windows-msi
          path: release-assets/

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: singularity-android-apk
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Singularity ${{ github.ref_name }}
          body: |
            ## Singularity ${{ github.ref_name }}

            IPTV/VOD streaming player for Windows Desktop and Android.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows (installer) | `Singularity Setup_*.exe` |
            | Windows (MSI) | `Singularity Setup_*.msi` |
            | Android | `*.apk` |

            ### Install
            - **Windows**: Run the `.exe` installer or the `.msi` package
            - **Android**: Enable "Install from unknown sources", then install the `.apk`
          files: release-assets/**/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
