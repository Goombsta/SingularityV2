name: Build Singularity

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Windows build → .exe + .msi
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const v = process.env.VERSION;
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            // MSI bundler requires numeric-only MAJOR.MINOR.PATCH — strip pre-release suffix
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json'));
            conf.version = v.replace(/-.*$/, '');
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            console.log('package.json:', v, ' tauri.conf.json:', conf.version);
          "
        env:
          VERSION: ${{ github.ref_name }}

      - name: Install npm dependencies
        run: npm ci

      - name: Verify libmpv-2.dll exists
        shell: bash
        run: |
          if [ ! -f "src-tauri/resources/libmpv-2.dll" ]; then
            echo "ERROR: src-tauri/resources/libmpv-2.dll is missing."
            echo "This file must be committed via Git LFS."
            exit 1
          fi
          echo "libmpv-2.dll found: $(ls -lh src-tauri/resources/libmpv-2.dll)"

      - name: Build Tauri (Windows)
        run: npm run tauri build

      - name: Rename installer artifacts
        shell: bash
        run: |
          EXE=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          if [ -n "$EXE" ]; then
            VERSION=$(echo "$EXE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
            mv "$EXE" "src-tauri/target/release/bundle/nsis/Singularity Setup_${VERSION}_x64-setup.exe"
          fi
          MSI=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          if [ -n "$MSI" ]; then
            VERSION=$(echo "$MSI" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
            mv "$MSI" "src-tauri/target/release/bundle/msi/Singularity Setup_${VERSION}_x64.msi"
          fi

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # Android build → .apk
  # ───────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973" --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const v = process.env.VERSION;
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json'));
            conf.version = v.replace(/-.*$/, '');
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            console.log('package.json:', v, ' tauri.conf.json:', conf.version);
          "
        env:
          VERSION: ${{ github.ref_name }}

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npm run tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Copy Kotlin plugin files into generated Android project
        run: |
          DEST="src-tauri/gen/android/app/src/main/java/com/singularity/app"
          MPV_LIB_DEST="src-tauri/gen/android/app/src/main/java/is/xyz/mpv"
          mkdir -p "$MPV_LIB_DEST"
          cp src-tauri/android-plugin/MpvPlugin.kt "$DEST/"
          cp src-tauri/android-plugin/MPVLib.kt "$MPV_LIB_DEST/"
          echo "Plugin files copied:"
          ls -la "$DEST/"
          ls -la "$MPV_LIB_DEST/"

      - name: Write MainActivity (edge-to-edge only; plugins registered from Rust)
        run: |
          MAINACTIVITY="src-tauri/gen/android/app/src/main/java/com/singularity/app/MainActivity.kt"
          cat > "$MAINACTIVITY" << 'EOF'
          package com.singularity.app

          import android.os.Bundle
          import androidx.activity.enableEdgeToEdge

          class MainActivity : TauriActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
              enableEdgeToEdge()
              super.onCreate(savedInstanceState)
            }
          }
          EOF
          echo "MainActivity updated"

      - name: Patch Gradle — add JitPack repository and NDK abiFilters
        run: |
          python3 - <<'PYEOF'
          import sys

          ROOT = "src-tauri/gen/android/build.gradle.kts"
          APP  = "src-tauri/gen/android/app/build.gradle.kts"

          # ── Root: add JitPack after the LAST mavenCentral() (allprojects block) ──
          root = open(ROOT).read()
          jitpack = '\n        maven { url = uri("https://jitpack.io") }'
          idx = root.rfind("mavenCentral()")
          if idx == -1:
              print("ERROR: mavenCentral() not found in root build.gradle.kts", file=sys.stderr)
              sys.exit(1)
          end = idx + len("mavenCentral()")
          root = root[:end] + jitpack + root[end:]
          open(ROOT, "w").write(root)
          print("Root Gradle patched — JitPack added")

          # ── App: add NDK abiFilters after versionName line ──
          app = open(APP).read()
          ndk_block = '\n        ndk {\n            abiFilters += listOf("arm64-v8a", "x86_64")\n        }'
          marker = 'versionName = tauriProperties.getProperty("tauri.android.versionName", "1.0")'
          if marker in app and 'abiFilters' not in app:
              app = app.replace(marker, marker + ndk_block)
              print("App Gradle patched — NDK abiFilters added")

          # ── App: ensure useLegacyPackaging for jniLibs (required for vendored libmpv.so) ──
          if 'useLegacyPackaging' not in app:
              legacy_block = '\n    packaging {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }'
              kotlin_opts = 'kotlinOptions {'
              if kotlin_opts in app:
                  idx = app.index(kotlin_opts)
                  end = app.index('}', idx) + 1
                  app = app[:end] + legacy_block + app[end:]
                  print("App Gradle patched — useLegacyPackaging added")

          # ── App: mark release build as non-debuggable (prevents Play Protect warning) ──
          if 'isDebuggable = false' not in app and 'getByName("release")' in app:
              app = app.replace(
                  'getByName("release") {',
                  'getByName("release") {\n            isDebuggable = false'
              )
              print("App Gradle patched — isDebuggable=false added to release build type")

          open(APP, "w").write(app)

          print("\n--- Root build.gradle.kts ---")
          print(open(ROOT).read())
          print("--- App build.gradle.kts ---")
          print(open(APP).read())
          PYEOF

      - name: Patch AndroidManifest — enable cleartext HTTP
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          # Replace placeholder or false with true so HTTP streams work on real devices
          sed -i \
            's/android:usesCleartextTraffic="\${usesCleartextTraffic}"/android:usesCleartextTraffic="true"/g' \
            "$MANIFEST"
          sed -i \
            's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/g' \
            "$MANIFEST"
          # Confirm the attribute is present (insert if missing entirely)
          grep -q 'usesCleartextTraffic="true"' "$MANIFEST" || \
            sed -i 's/android:theme="@style\/Theme.singularity"/android:theme="@style\/Theme.singularity"\n        android:usesCleartextTraffic="true"/' "$MANIFEST"
          # Add REQUEST_INSTALL_PACKAGES permission (needed for in-app APK updater)
          grep -q 'REQUEST_INSTALL_PACKAGES' "$MANIFEST" || \
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />|' "$MANIFEST"
          echo "--- Manifest after patch ---"
          cat "$MANIFEST"

      - name: Write gradle.properties (AndroidX + JVM args)
        run: |
          cat > src-tauri/gen/android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > "$HOME/singularity.keystore"
          echo "KEYSTORE_PATH=$HOME/singularity.keystore" >> $GITHUB_ENV

      - name: Patch Gradle — inject release signingConfig
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: python3 scripts/patch_signing.py src-tauri/gen/android/app/build.gradle.kts

      - name: Build Tauri Android (APK, release)
        run: npm run tauri android build -- --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Collect and verify APK
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk/universal/release \
                     src-tauri/gen/android/app/build/outputs/apk/release \
                     src-tauri/gen/android/app/build/outputs/apk \
                     -name "*.apk" 2>/dev/null | grep -v unsigned | head -1)
          echo "Found APK: $APK"
          cp "$APK" /tmp/SingularityV2.apk
          BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | sort -V | tail -1)
          $BUILD_TOOLS/apksigner verify --verbose /tmp/SingularityV2.apk && echo "Verification OK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-android-apk
          path: /tmp/SingularityV2.apk
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  # Create GitHub Release (only on version tags)
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Windows .exe
        uses: actions/download-artifact@v4
        with:
          name: singularity-windows-exe
          path: release-assets/

      - name: Download Windows .msi
        uses: actions/download-artifact@v4
        with:
          name: singularity-windows-msi
          path: release-assets/

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: singularity-android-apk
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Singularity ${{ github.ref_name }}
          body: |
            ## Singularity ${{ github.ref_name }}

            IPTV/VOD streaming player for Windows Desktop and Android.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows (installer) | `Singularity Setup_*.exe` |
            | Windows (MSI) | `Singularity Setup_*.msi` |
            | Android | `*.apk` |

            ### Install
            - **Windows**: Run the `.exe` installer or the `.msi` package
            - **Android**: Enable "Install from unknown sources", then install the `.apk`
          files: release-assets/**/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
